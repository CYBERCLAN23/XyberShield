<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Login Stylé</title>
  <link rel="stylesheet" href="log.css">
  </head>
  <body>
  
    <form action="home.html">
       <div class="login">
        <div class="left-panel">
          <h1>XyberShield</h1>
          <p class="slogant">Signalez. Protégez. Prévenez.</p>
<p class="welcome">Bienvenue sur XyberShield. Connectez-vous pour signaler un incident, consulter nos ressources de cybersécurité et contribuer à un internet plus sûr.</p>
        <div class="reg"> Register</div>
        </div>


     <div class="right-panel">
      <div class="head">LOGIN</div>
      <div class="log-form">
        <div class="email">
            <label for="email"><i class="fas fa-envelope"></i></label>
          <input type="email" name="email" id="email" placeholder="Enter Your Email" required>
        </div>

        <div class="Password">
             <label for="password"><i class="fas fa-lock"></i></label>
          <input type="password" name="password" id="password" placeholder="Enter Your Password" required>
        </div>

        <div class="SUBMITE">
         
          <button id="valide"><i class="fas fa-terminal"></i>  GO ON</button>
        </div>
      </div>
     </div>
      

      </div>
  </form>

   
  </body>
  <script href="login.js"></script>
</html>
