<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transition</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video autoplay muted playsinline id="transitionVideo">
    <source src="transition.mp4" type="video/mp4">
    Your browser does not support video.
  </video>

  <script>
    const video = document.getElementById('transitionVideo');

    // Redirect when video ends
    video.onended = () => {
      window.location.href = "home.html";
    };

    // (Optional) Force redirect after X seconds, in case video fails
    setTimeout(() => {
      window.location.href = "home.html";
    }, 5000); // 5 seconds
  </script>
</body>
</html>
