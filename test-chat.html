<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XyberBot Test - XyberClan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .test-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .test-section {
            margin-bottom: 30px;
        }

        .test-section h2 {
            color: #4a5568;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .test-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .test-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .test-button:hover {
            transform: translateY(-2px);
        }

        .test-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box p {
            color: #1e40af;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #718096;
            font-size: 0.85rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🛡️ XyberBot Test</h1>
        <p class="subtitle">Test your secure chatbot backend</p>

        <div class="info-box">
            <p><strong>📋 Instructions:</strong> Enter a test message below and click "Send Test". The response will appear in the box below.</p>
        </div>

        <div class="test-section">
            <h2>
                Test Message
                <span class="status pending" id="status">Ready</span>
            </h2>
            <input 
                type="text" 
                class="test-input" 
                id="testInput" 
                placeholder="How do I create a strong password?"
                value="How do I create a strong password?"
            >
            <button class="test-button" id="sendBtn" onclick="sendTest()">
                🚀 Send Test
            </button>
        </div>

        <div class="test-section">
            <h2>Response</h2>
            <div class="response-box" id="responseBox">Waiting for test...</div>
        </div>

        <div class="footer">
            <p>
                <strong>Powered by XyberClan</strong><br>
                Developed by <a href="https://almightportfolio.vercel.app/" target="_blank">Almight</a>
            </p>
        </div>
    </div>

    <script>
        const API_ENDPOINT = '/api/chat'; // Change to your Vercel URL in production
        const SESSION_ID = `test_${Date.now()}`;

        async function sendTest() {
            const input = document.getElementById('testInput');
            const responseBox = document.getElementById('responseBox');
            const status = document.getElementById('status');
            const sendBtn = document.getElementById('sendBtn');

            const message = input.value.trim();

            if (!message) {
                alert('Please enter a test message');
                return;
            }

            // Update UI
            sendBtn.disabled = true;
            status.textContent = 'Sending...';
            status.className = 'status pending';
            responseBox.textContent = 'Waiting for response...';

            try {
                console.log('📤 Sending test message:', message);

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: SESSION_ID
                    })
                });

                const data = await response.json();
                console.log('📥 Response:', data);

                if (data.error) {
                    status.textContent = 'Error';
                    status.className = 'status error';
                    responseBox.textContent = `❌ Error: ${data.error}`;
                } else {
                    status.textContent = 'Success';
                    status.className = 'status success';
                    responseBox.textContent = `✅ Response:\n\n${data.response}`;
                }

            } catch (error) {
                console.error('💥 Error:', error);
                status.textContent = 'Error';
                status.className = 'status error';
                responseBox.textContent = `❌ Network Error: ${error.message}\n\nCheck console for details.`;
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Allow Enter key to send
        document.getElementById('testInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendTest();
            }
        });

        console.log('%c🛡️ XyberBot Test Page', 'font-size: 16px; font-weight: bold; color: #667eea;');
        console.log('%cDeveloped by Almight @ XyberClan', 'font-size: 12px; color: #666;');
    </script>
</body>
</html>
